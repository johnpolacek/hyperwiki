<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HyperWiki Workspace</title>
  <link rel="stylesheet" href="/assets/app.css">
  <link rel="stylesheet" href="/vendor/@wterm/dom/src/terminal.css">
  <script type="importmap">
    {
      "imports": {
        "@wterm/core": "/vendor/@wterm/core/dist/index.js"
      }
    }
  </script>
</head>
<body>
  <main class="workspace">
    <aside id="project-sidebar" class="project-sidebar" hidden>
      <button type="button" id="project-toggle" class="project-toggle" aria-expanded="true">Projects</button>
      <div id="project-list" class="project-list" aria-label="Projects"></div>
    </aside>
    <aside class="sidebar">
      <div class="brand">
        <h1>HyperWiki</h1>
        <span id="server-status" hidden>Local</span>
      </div>
      <nav class="primary-nav" aria-label="Primary workspace pages">
        <a id="home-link" href="#/wiki/index.html">Home</a>
        <a id="current-plan-link" href="#/wiki/plans/index.html">Current Plan</a>
        <a id="log-link" href="#/wiki/log.html">Log</a>
      </nav>
      <nav id="wiki-nav" class="wiki-nav" aria-label="Wiki pages">
        <a href="/wiki/index.html" target="wiki-frame" data-wiki-link>Home</a>
      </nav>
      <section class="workspace-summary" aria-label="Workspace summary">
        <h2>Status</h2>
        <ul id="plan-summary"></ul>
      </section>
    </aside>
    <section class="wiki-pane">
      <header class="pane-header">
        <div>
          <p>Wiki</p>
          <strong id="current-page">/wiki/index.html</strong>
        </div>
        <a id="open-page" href="/wiki/index.html" target="_blank" rel="noreferrer">Open</a>
      </header>
      <iframe id="wiki-frame" name="wiki-frame" title="Wiki" src="/wiki/index.html"></iframe>
      <form id="plan-prompt" class="plan-prompt" hidden>
        <label for="plan-prompt-input">Plan prompt</label>
        <textarea id="plan-prompt-input" rows="1" placeholder="Ask the agent to revise this plan..."></textarea>
        <button type="submit" aria-label="Send prompt to agent">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m3 3 3 9-3 9 19-9Z"></path>
            <path d="M6 12h16"></path>
          </svg>
          <span>Send</span>
        </button>
        <p id="plan-prompt-status" role="status"></p>
      </form>
    </section>
    <section class="terminal-pane">
      <div class="repo-context" id="repo-context">
        <span>Repo</span>
        <strong id="repo-branch">Unknown</strong>
        <span id="repo-dirty">Checking</span>
      </div>
      <div class="terminal-toolbar">
        <div id="terminal-tabs" class="terminal-tabs" role="tablist" aria-label="Terminal panels"></div>
        <button type="button" id="new-terminal">New</button>
      </div>
      <details class="terminal-actions">
        <summary>Session</summary>
        <button type="button" id="rename-terminal">Rename</button>
        <button type="button" id="restart-terminal">Restart</button>
        <button type="button" id="close-terminal">Close</button>
        <button type="button" id="export-terminal">Export</button>
        <button type="button" id="prune-sessions">Prune</button>
      </details>
      <details class="terminal-guardrails" aria-label="Terminal guardrails">
        <summary><span id="guardrail-mode">Local-only</span><strong id="active-session-boundary">Session details</strong></summary>
        <dl>
          <div>
            <dt>Canonical</dt>
            <dd id="canonical-boundary">wiki/ and Git</dd>
          </div>
          <div>
            <dt>Runtime</dt>
            <dd id="runtime-boundary">.hyperwiki/state/ and .hyperwiki/sessions/</dd>
          </div>
        </dl>
      </details>
      <div id="terminals" class="terminals"></div>
    </section>
  </main>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
